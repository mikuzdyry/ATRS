<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${title}">ATRS</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <nav th:fragment="nav(currentUser)" class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand" href="/">
                <i class="bi bi-airplane-engines-fill"></i>ATRS
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/"><i class="bi bi-house-door me-1"></i>首页</a></li>
                    <li class="nav-item" th:if="${currentUser != null}">
                        <a class="nav-link" th:href="@{/order/list}"><i class="bi bi-ticket-perforated me-1"></i>我的订单</a>
                    </li>
                    <li class="nav-item" th:if="${currentUser != null and currentUser.role == 'ADMIN'}">
                        <a class="nav-link" th:href="@{/admin}"><i class="bi bi-speedometer2 me-1"></i>后台管理</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <th:block th:if="${currentUser == null}">
                        <li class="nav-item"><a class="nav-link" th:href="@{/user/login}"><i class="bi bi-box-arrow-in-right me-1"></i>登录</a></li>
                        <li class="nav-item"><a class="nav-link" th:href="@{/user/register}"><i class="bi bi-person-plus me-1"></i>注册</a></li>
                    </th:block>
                    <th:block th:if="${currentUser != null}">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown">
                                <i class="bi bi-person-circle me-1"></i>
                                <span th:text="${currentUser.realName != null ? currentUser.realName : currentUser.username}">用户</span>
                            </a>
                            <ul class="dropdown-menu dropdown-menu-end">
                                <li><a class="dropdown-item" th:href="@{/user/profile}"><i class="bi bi-gear me-2"></i>个人信息</a></li>
                                <li><hr class="dropdown-divider"></li>
                                <li><a class="dropdown-item" th:href="@{/user/logout}"><i class="bi bi-box-arrow-right me-2"></i>退出登录</a></li>
                            </ul>
                        </li>
                    </th:block>
                </ul>
            </div>
        </div>
    </nav>

    <footer th:fragment="footer" class="footer">
        <div class="container text-center">
            <span>&copy; 2026 ATRS 机票预定系统 · 安全 · 便捷 · 可靠</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
