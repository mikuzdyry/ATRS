<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments :: head('我的订单 - ATRS')"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="fragments :: nav(${currentUser})"></nav>

    <div class="page-header">
        <div class="container">
            <h2><i class="bi bi-ticket-perforated me-2"></i>我的订单</h2>
        </div>
    </div>

    <div class="container mb-5 animate-fade-in-up">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div th:if="${orders != null and !orders.isEmpty()}">
            <div class="table-responsive">
                <table class="table">
                    <thead>
                        <tr>
                            <th>订单号</th>
                            <th>航班号</th>
                            <th>行程</th>
                            <th>日期</th>
                            <th>舱位</th>
                            <th>金额</th>
                            <th>状态</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="order : ${orders}">
                            <td><code th:text="${order.orderNo}"></code></td>
                            <td><strong th:text="${order.flight.flightNo}"></strong></td>
                            <td><span th:text="${order.flight.departureCity}"></span> <i class="bi bi-arrow-right mx-1"></i> <span th:text="${order.flight.arrivalCity}"></span></td>
                            <td th:text="${order.flight.flightDate}"></td>
                            <td>
                                <span th:if="${order.seatClass.name() == 'ECONOMY'}" class="badge badge-economy">经济舱</span>
                                <span th:if="${order.seatClass.name() == 'BUSINESS'}" class="badge badge-business">商务舱</span>
                                <span th:if="${order.seatClass.name() == 'FIRST'}" class="badge badge-first">头等舱</span>
                            </td>
                            <td class="price-text">¥<span th:text="${order.totalPrice}"></span></td>
                            <td><span class="badge" th:classappend="'badge-' + ${order.status.name()}" th:text="${order.status.name()}"></span></td>
                            <td>
                                <a th:href="@{/order/detail/{no}(no=${order.orderNo})}" class="btn btn-outline-primary btn-sm">
                                    <i class="bi bi-eye me-1"></i>查看
                                </a>
                                <a th:if="${order.status.name() == 'PENDING'}" th:href="@{/booking/confirm/{no}(no=${order.orderNo})}" class="btn btn-success btn-sm">
                                    <i class="bi bi-credit-card me-1"></i>支付
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div th:if="${orders == null or orders.isEmpty()}" class="text-center py-5">
            <div class="empty-icon"><i class="bi bi-inbox"></i></div>
            <p class="empty-state mt-3">暂无订单</p>
            <a href="/" class="btn btn-primary"><i class="bi bi-search me-1"></i>去搜索航班</a>
        </div>
    </div>

    <footer th:replace="fragments :: footer" class="mt-auto"></footer>
</body>
</html>
