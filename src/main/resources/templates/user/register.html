<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments :: head('注册 - ATRS')"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="fragments :: nav(${currentUser})"></nav>
    <div class="container">
        <div class="card auth-card animate-fade-in-up" style="max-width: 520px;">
            <div class="card-header">
                <i class="bi bi-person-plus me-2"></i>用户注册
            </div>
            <div class="card-body">
                <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>
                <form method="post" th:action="@{/user/register}">
                    <div class="mb-3">
                        <label class="form-label">用户名 <span class="text-danger">*</span></label>
                        <input type="text" name="username" class="form-control" required minlength="3" placeholder="至少3个字符">
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">密码 <span class="text-danger">*</span></label>
                            <input type="password" name="password" class="form-control" required minlength="6" placeholder="至少6位">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">确认密码 <span class="text-danger">*</span></label>
                            <input type="password" name="confirmPassword" class="form-control" required minlength="6" placeholder="再次输入密码">
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">真实姓名</label>
                        <input type="text" name="realName" class="form-control" placeholder="选填">
                    </div>
                    <div class="row mb-3">
                        <div class="col-md-6">
                            <label class="form-label">手机号</label>
                            <input type="text" name="phone" class="form-control" placeholder="选填">
                        </div>
                        <div class="col-md-6">
                            <label class="form-label">邮箱</label>
                            <input type="email" name="email" class="form-control" placeholder="选填">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 btn-lg">
                        <i class="bi bi-check-lg me-1"></i>注册
                    </button>
                </form>
                <div class="text-center mt-4">
                    <span class="muted-text">已有账号？</span>
                    <a th:href="@{/user/login}" class="fw-bold">立即登录 <i class="bi bi-arrow-right"></i></a>
                </div>
            </div>
        </div>
    </div>
    <footer th:replace="fragments :: footer" class="mt-auto"></footer>
</body>
</html>
