<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments :: head('个人信息 - ATRS')"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="fragments :: nav(${currentUser})"></nav>
    <div class="container mt-4 mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-8 animate-fade-in-up">
                <div class="text-center mb-4">
                    <div class="profile-avatar">
                        <span th:text="${user.realName != null ? #strings.substring(user.realName,0,1) : #strings.substring(user.username,0,1)}">U</span>
                    </div>
                    <h4 class="fw-bold" th:text="${user.realName != null ? user.realName : user.username}"></h4>
                    <span class="badge" th:classappend="${user.role == 'ADMIN' ? 'badge-scheduled' : 'badge-economy'}">
                        <i class="bi" th:class="${user.role == 'ADMIN' ? 'bi-shield-check' : 'bi-person'}"></i>
                        <span th:text="${user.role == 'ADMIN' ? '管理员' : '普通用户'}"></span>
                    </span>
                </div>

                <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

                <div class="card">
                    <div class="card-body">
                        <h5 class="mb-4 fw-bold"><i class="bi bi-pencil-square me-2" style="color:var(--primary);"></i>编辑资料</h5>
                        <form method="post" th:action="@{/user/profile}">
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">用户名</label>
                                    <input type="text" class="form-control bg-light" th:value="${user.username}" disabled>
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">真实姓名</label>
                                    <input type="text" name="realName" class="form-control" th:value="${user.realName}">
                                </div>
                            </div>
                            <div class="row mb-3">
                                <div class="col-md-6">
                                    <label class="form-label">手机号</label>
                                    <input type="text" name="phone" class="form-control" th:value="${user.phone}">
                                </div>
                                <div class="col-md-6">
                                    <label class="form-label">邮箱</label>
                                    <input type="email" name="email" class="form-control" th:value="${user.email}">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label">身份证号</label>
                                <input type="text" name="idCard" class="form-control" th:value="${user.idCard}">
                            </div>
                            <button type="submit" class="btn btn-primary">
                                <i class="bi bi-check-lg me-1"></i>保存修改
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <footer th:replace="fragments :: footer" class="mt-auto"></footer>
</body>
</html>
