<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments :: head('电子票 - ATRS')"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="fragments :: nav(${currentUser})"></nav>

    <div class="container mt-4 mb-5 animate-fade-in-up">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="card mb-4" th:object="${order}">
            <div class="card-header d-flex justify-content-between align-items-center text-white"
                 th:classappend="${order.status.name() == 'PAID'} ? 'bg-success' : (${order.status.name() == 'CANCELLED'} ? 'bg-secondary' : 'bg-primary')">
                <h5 class="mb-0 fw-bold"><i class="bi bi-ticket-perforated me-2"></i>电子票 — <span th:text="*{orderNo}"></span></h5>
                <span class="badge" style="background:rgba(255,255,255,0.25);color:#fff;" th:text="*{status.name()}"></span>
            </div>
            <div class="card-body p-4">
                <div class="row mb-4">
                    <div class="col-md-6">
                        <h6 class="fw-bold mb-3"><i class="bi bi-airplane me-1"></i>航班信息</h6>
                        <div class="d-flex flex-column gap-2">
                            <div><strong>航班号：</strong><span th:text="*{flight.flightNo}"></span></div>
                            <div><strong>航空公司：</strong><span th:text="*{flight.airline}"></span></div>
                            <div><strong>日期：</strong><span th:text="*{flight.flightDate}"></span></div>
                            <div><strong>行程：</strong><span th:text="*{flight.departureCity}"></span> <i class="bi bi-arrow-right mx-1"></i> <span th:text="*{flight.arrivalCity}"></span></div>
                            <div><strong>时间：</strong><span th:text="*{flight.departureTime}"></span> - <span th:text="*{flight.arrivalTime}"></span></div>
                        </div>
                    </div>
                    <div class="col-md-6">
                        <h6 class="fw-bold mb-3"><i class="bi bi-info-circle me-1"></i>订单信息</h6>
                        <div class="d-flex flex-column gap-2">
                            <div><strong>订单号：</strong><span th:text="*{orderNo}"></span></div>
                            <div><strong>舱位：</strong>
                                <span th:if="*{seatClass.name() == 'ECONOMY'}" class="badge badge-economy">经济舱</span>
                                <span th:if="*{seatClass.name() == 'BUSINESS'}" class="badge badge-business">商务舱</span>
                                <span th:if="*{seatClass.name() == 'FIRST'}" class="badge badge-first">头等舱</span>
                            </div>
                            <div><strong>金额：</strong><span class="price-text">¥<span th:text="*{totalPrice}"></span></span></div>
                            <div><strong>联系人：</strong><span th:text="*{contactName}"></span> (<span th:text="*{contactPhone}"></span>)</div>
                            <th:block th:if="${order.paymentRecord != null}">
                                <div><strong>支付流水号：</strong><code th:text="*{paymentRecord.transactionNo}"></code></div>
                                <div><strong>支付时间：</strong><span th:text="*{paymentRecord.paidAt}"></span></div>
                            </th:block>
                        </div>
                    </div>
                </div>

                <h6 class="fw-bold mb-2"><i class="bi bi-people me-1"></i>乘客信息</h6>
                <table class="table">
                    <thead>
                        <tr><th>姓名</th><th>证件号</th><th>手机号</th><th th:if="*{status.name() == 'PAID'}">票号</th></tr>
                    </thead>
                    <tbody>
                        <tr th:each="p : *{passengers}">
                            <td th:text="${p.name}"></td>
                            <td th:text="${p.idCard}"></td>
                            <td th:text="${p.phone}"></td>
                            <td th:if="*{status.name() == 'PAID'}" th:text="${p.ticketNo}"></td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="d-flex gap-2">
            <a th:href="@{/order/list}" class="btn btn-outline-primary"><i class="bi bi-list-ul me-1"></i>返回订单列表</a>
            <form th:action="@{/order/cancel/{no}(no=${order.orderNo})}" method="post"
                  th:if="${order.status.name() != 'CANCELLED' and order.status.name() != 'REFUNDED'}">
                <button type="submit" class="btn btn-outline-danger" onclick="return confirm('确定要取消该订单吗？')">
                    <i class="bi bi-x-circle me-1"></i>取消订单
                </button>
            </form>
        </div>
    </div>

    <footer th:replace="fragments :: footer" class="mt-auto"></footer>
</body>
</html>
