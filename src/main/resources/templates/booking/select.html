<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments :: head('填写乘客信息 - ATRS')"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="fragments :: nav(${currentUser})"></nav>

    <div class="page-header">
        <div class="container">
            <div class="booking-step">
                <div class="step done"><i class="bi bi-check"></i></div>
                <div class="step-arrow done"></div>
                <div class="step active">2</div>
                <div class="step-arrow"></div>
                <div class="step">3</div>
            </div>
            <h2><i class="bi bi-pencil-square me-2"></i>填写乘客信息</h2>
        </div>
    </div>

    <div class="container mb-5 animate-fade-in-up">
        <div class="card mb-4">
            <div class="card-header">
                <i class="bi bi-airplane-engines me-2" style="color:var(--primary);"></i>航班信息
            </div>
            <div class="card-body" th:object="${flight}">
                <div class="row">
                    <div class="col-md-3"><strong class="flight-no" th:text="*{flightNo}"></strong></div>
                    <div class="col-md-3"><span th:text="*{departureCity}"></span> <i class="bi bi-arrow-right mx-1"></i> <span th:text="*{arrivalCity}"></span></div>
                    <div class="col-md-3"><span th:text="*{departureTime}"></span> - <span th:text="*{arrivalTime}"></span></div>
                    <div class="col-md-3"><i class="bi bi-calendar3 me-1"></i><span th:text="*{flightDate}"></span></div>
                </div>
            </div>
        </div>

        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <form th:action="@{/booking/submit}" method="post" id="bookingForm">
            <input type="hidden" name="flightId" th:value="${flight.id}">
            <input type="hidden" name="seatClass" th:value="${seatClass}">

            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="fw-bold mb-3"><i class="bi bi-person-badge me-2" style="color:var(--primary);"></i>联系人信息</h5>
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label class="form-label">姓名 <span class="text-danger">*</span></label>
                            <input type="text" name="contactName" class="form-control" required placeholder="请输入联系人姓名">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">手机号 <span class="text-danger">*</span></label>
                            <input type="text" name="contactPhone" class="form-control" required placeholder="请输入手机号">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label">邮箱</label>
                            <input type="email" name="contactEmail" class="form-control" placeholder="选填">
                        </div>
                    </div>
                </div>
            </div>

            <div class="card mb-4">
                <div class="card-body">
                    <h5 class="fw-bold mb-3"><i class="bi bi-people me-2" style="color:var(--primary);"></i>乘客信息</h5>
                    <div class="mb-3">
                        <label class="form-label">乘客数量</label>
                        <select id="passengerCount" class="form-select" style="width: 200px;" onchange="updatePassengerFields()">
                            <option value="1">1 位乘客</option>
                            <option value="2">2 位乘客</option>
                            <option value="3">3 位乘客</option>
                            <option value="4">4 位乘客</option>
                            <option value="5">5 位乘客</option>
                        </select>
                    </div>
                    <div id="passengerContainer">
                        <div class="passenger-row border rounded-3 p-3 mb-2" data-index="0">
                            <h6 class="fw-bold mb-2"><i class="bi bi-person me-1"></i>乘客 1</h6>
                            <div class="row g-2">
                                <div class="col-md-4">
                                    <label class="form-label">姓名 <span class="text-danger">*</span></label>
                                    <input type="text" name="passengers[0].name" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">证件号 <span class="text-danger">*</span></label>
                                    <input type="text" name="passengers[0].idCard" class="form-control" required>
                                </div>
                                <div class="col-md-4">
                                    <label class="form-label">手机号</label>
                                    <input type="text" name="passengers[0].phone" class="form-control">
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="mb-4">
                <label class="form-label">备注</label>
                <textarea name="remark" class="form-control" rows="2" placeholder="如有特殊需求，请在此备注（选填）"></textarea>
            </div>

            <button type="submit" class="btn btn-primary btn-lg w-100">
                <i class="bi bi-check2-circle me-1"></i>提交订单
            </button>
        </form>
    </div>

    <footer th:replace="fragments :: footer" class="mt-auto"></footer>

    <script>
        function updatePassengerFields() {
            const count = parseInt(document.getElementById('passengerCount').value);
            const container = document.getElementById('passengerContainer');
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                container.innerHTML += `
                    <div class="passenger-row border rounded-3 p-3 mb-2">
                        <h6 class="fw-bold mb-2"><i class="bi bi-person me-1"></i>乘客 ${i + 1}</h6>
                        <div class="row g-2">
                            <div class="col-md-4">
                                <label class="form-label">姓名 <span class="text-danger">*</span></label>
                                <input type="text" name="passengers[${i}].name" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">证件号 <span class="text-danger">*</span></label>
                                <input type="text" name="passengers[${i}].idCard" class="form-control" required>
                            </div>
                            <div class="col-md-4">
                                <label class="form-label">手机号</label>
                                <input type="text" name="passengers[${i}].phone" class="form-control">
                            </div>
                        </div>
                    </div>`;
            }
        }
    </script>
</body>
</html>
