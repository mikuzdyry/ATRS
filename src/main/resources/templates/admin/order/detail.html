<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments :: head('订单详情 - ATRS')"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="fragments :: nav(${currentUser})"></nav>

    <div class="container mt-4 mb-5 animate-fade-in-up">
        <a th:href="@{/admin/order/list}" class="btn btn-outline-secondary btn-sm mb-3"><i class="bi bi-arrow-left me-1"></i>返回订单列表</a>

        <div th:if="${order == null}" class="alert alert-warning">订单不存在</div>

        <div th:if="${order != null}" th:object="${order}">
            <div class="card">
                <div class="card-header d-flex justify-content-between align-items-center text-white"
                     th:classappend="${order.status.name() == 'PAID'} ? 'bg-success' : (${order.status.name() == 'CANCELLED'} ? 'bg-secondary' : 'bg-primary')">
                    <div>
                        <i class="bi bi-receipt me-2"></i>订单号：<strong th:text="*{orderNo}"></strong>
                    </div>
                    <span class="badge" style="background:rgba(255,255,255,0.25);color:#fff;" th:text="*{status.name()}"></span>
                </div>
                <div class="card-body p-4">
                    <div class="row mb-4">
                        <div class="col-md-6">
                            <h6 class="fw-bold mb-3"><i class="bi bi-person me-1"></i>用户信息</h6>
                            <p><strong>用户名：</strong><span th:text="*{user.username}"></span></p>
                            <p><strong>联系人：</strong><span th:text="*{contactName}"></span> (<span th:text="*{contactPhone}"></span>)</p>
                        </div>
                        <div class="col-md-6">
                            <h6 class="fw-bold mb-3"><i class="bi bi-airplane me-1"></i>航班信息</h6>
                            <p><strong>航班号：</strong><span th:text="*{flight.flightNo}"></span></p>
                            <p><strong>行程：</strong><span th:text="*{flight.departureCity}"></span> <i class="bi bi-arrow-right mx-1"></i> <span th:text="*{flight.arrivalCity}"></span></p>
                            <p><strong>日期：</strong><span th:text="*{flight.flightDate}"></span></p>
                            <p><strong>金额：</strong><span class="price-text">¥<span th:text="*{totalPrice}"></span></span></p>
                        </div>
                    </div>

                    <h6 class="fw-bold mb-2"><i class="bi bi-people me-1"></i>乘客列表</h6>
                    <table class="table">
                        <thead><tr><th>姓名</th><th>证件号</th><th>手机号</th><th>票号</th></tr></thead>
                        <tbody>
                            <tr th:each="p : *{passengers}">
                                <td th:text="${p.name}"></td>
                                <td th:text="${p.idCard}"></td>
                                <td th:text="${p.phone}"></td>
                                <td><code th:text="${p.ticketNo}"></code></td>
                            </tr>
                        </tbody>
                    </table>

                    <form th:action="@{/admin/order/cancel}" method="post"
                          th:if="${order.status.name() != 'CANCELLED' and order.status.name() != 'REFUNDED'}"
                          class="mt-4">
                        <input type="hidden" name="orderId" th:value="*{id}">
                        <button type="submit" class="btn btn-danger" onclick="return confirm('确定取消该订单吗？')">
                            <i class="bi bi-x-circle me-1"></i>取消此订单
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="fragments :: footer" class="mt-auto"></footer>
</body>
</html>
