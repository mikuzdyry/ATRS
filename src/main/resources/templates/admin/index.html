<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments :: head('管理后台 - ATRS')"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="fragments :: nav(${currentUser})"></nav>

    <div class="page-header">
        <div class="container">
            <h2><i class="bi bi-speedometer2 me-2"></i>管理后台</h2>
        </div>
    </div>

    <div class="container mb-5 animate-fade-in-up">
        <div class="row g-4 mb-4">
            <div class="col-md-3">
                <div class="card text-white border-0" style="background: linear-gradient(135deg, #1a5fce, #2980e8);">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-airplane-engines" style="font-size:2.2rem; opacity: 0.9;"></i>
                        <h1 class="mt-2 mb-0 fw-bold" th:text="${flightCount}">0</h1>
                        <p class="mb-0" style="opacity: 0.8;">航班总数</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white border-0" style="background: linear-gradient(135deg, #0d9444, #16a34a);">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-receipt" style="font-size:2.2rem; opacity: 0.9;"></i>
                        <h1 class="mt-2 mb-0 fw-bold" th:text="${orderCount}">0</h1>
                        <p class="mb-0" style="opacity: 0.8;">订单总数</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white border-0" style="background: linear-gradient(135deg, #e39808, #f5a623);">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-check-circle" style="font-size:2.2rem; opacity: 0.9;"></i>
                        <h1 class="mt-2 mb-0 fw-bold" th:text="${paidOrderCount}">0</h1>
                        <p class="mb-0" style="opacity: 0.8;">已支付</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-white border-0" style="background: linear-gradient(135deg, #dc3a2f, #ef4444);">
                    <div class="card-body text-center py-4">
                        <i class="bi bi-people" style="font-size:2.2rem; opacity: 0.9;"></i>
                        <h1 class="mt-2 mb-0 fw-bold" th:text="${userCount}">0</h1>
                        <p class="mb-0" style="opacity: 0.8;">用户总数</p>
                    </div>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-md-4">
                <a th:href="@{/admin/flight/list}" class="card text-decoration-none p-4 text-center hover-shadow">
                    <i class="bi bi-airplane" style="font-size:2.8rem;color:var(--primary);"></i>
                    <h5 class="mt-3 fw-bold" style="color: var(--gray-800);">航班管理</h5>
                    <small class="muted-text">添加、编辑、删除航班</small>
                </a>
            </div>
            <div class="col-md-4">
                <a th:href="@{/admin/order/list}" class="card text-decoration-none p-4 text-center hover-shadow">
                    <i class="bi bi-ticket-perforated" style="font-size:2.8rem;color:var(--success);"></i>
                    <h5 class="mt-3 fw-bold" style="color: var(--gray-800);">订单管理</h5>
                    <small class="muted-text">查看和管理所有订单</small>
                </a>
            </div>
            <div class="col-md-4">
                <a th:href="@{/admin/user/list}" class="card text-decoration-none p-4 text-center hover-shadow">
                    <i class="bi bi-person-badge" style="font-size:2.8rem;color:var(--warning);"></i>
                    <h5 class="mt-3 fw-bold" style="color: var(--gray-800);">用户管理</h5>
                    <small class="muted-text">查看所有注册用户</small>
                </a>
            </div>
        </div>
    </div>

    <footer th:replace="fragments :: footer" class="mt-auto"></footer>
</body>
</html>
