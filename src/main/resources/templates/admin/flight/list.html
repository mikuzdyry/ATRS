<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments :: head('航班管理 - ATRS')"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="fragments :: nav(${currentUser})"></nav>

    <div class="page-header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <h2><i class="bi bi-airplane me-2"></i>航班管理</h2>
                <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>返回后台</a>
            </div>
        </div>
    </div>

    <div class="container mb-5 animate-fade-in-up">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>
        <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

        <div class="mb-3">
            <a th:href="@{/admin/flight/add}" class="btn btn-primary"><i class="bi bi-plus-lg me-1"></i>添加航班</a>
        </div>

        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr><th>ID</th><th>航班号</th><th>航空公司</th><th>出发</th><th>到达</th><th>日期</th><th>状态</th><th>操作</th></tr>
                </thead>
                <tbody>
                    <tr th:each="flight : ${flights}">
                        <td th:text="${flight.id}"></td>
                        <td><strong th:text="${flight.flightNo}"></strong></td>
                        <td th:text="${flight.airline}"></td>
                        <td th:text="${flight.departureCity}"></td>
                        <td th:text="${flight.arrivalCity}"></td>
                        <td th:text="${flight.flightDate}"></td>
                        <td><span class="badge" th:classappend="'badge-' + ${flight.status.name()}" th:text="${flight.status.name()}"></span></td>
                        <td>
                            <div class="d-flex gap-1">
                                <a th:href="@{/admin/flight/edit/{id}(id=${flight.id})}" class="btn btn-outline-warning btn-sm"><i class="bi bi-pencil me-1"></i>编辑</a>
                                <form th:action="@{/admin/flight/delete/{id}(id=${flight.id})}" method="post"
                                      onsubmit="return confirm('确定删除该航班吗？')">
                                    <button type="submit" class="btn btn-outline-danger btn-sm"><i class="bi bi-trash me-1"></i>删除</button>
                                </form>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer th:replace="fragments :: footer" class="mt-auto"></footer>
</body>
</html>
