<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments :: head('用户管理 - ATRS')"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="fragments :: nav(${currentUser})"></nav>

    <div class="page-header">
        <div class="container">
            <div class="d-flex justify-content-between align-items-center">
                <h2><i class="bi bi-people me-2"></i>用户管理</h2>
                <a th:href="@{/admin}" class="btn btn-outline-secondary btn-sm"><i class="bi bi-arrow-left me-1"></i>返回后台</a>
            </div>
        </div>
    </div>

    <div class="container mb-5 animate-fade-in-up">
        <div th:if="${success}" class="alert alert-success" th:text="${success}"></div>

        <div class="table-responsive">
            <table class="table">
                <thead>
                    <tr><th>ID</th><th>用户名</th><th>真实姓名</th><th>手机号</th><th>邮箱</th><th>角色</th><th>注册时间</th><th>操作</th></tr>
                </thead>
                <tbody>
                    <tr th:each="user : ${users}">
                        <td th:text="${user.id}"></td>
                        <td><strong th:text="${user.username}"></strong></td>
                        <td th:text="${user.realName}"></td>
                        <td th:text="${user.phone}"></td>
                        <td th:text="${user.email}"></td>
                        <td>
                            <span th:if="${user.role == 'ADMIN'}" class="badge badge-scheduled"><i class="bi bi-shield-check me-1"></i>管理员</span>
                            <span th:if="${user.role == 'USER'}" class="badge badge-economy"><i class="bi bi-person me-1"></i>普通用户</span>
                        </td>
                        <td th:text="${user.createdAt}"></td>
                        <td>
                            <a th:href="@{/admin/user/detail/{id}(id=${user.id})}" class="btn btn-outline-primary btn-sm"><i class="bi bi-eye me-1"></i>详情</a>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <footer th:replace="fragments :: footer" class="mt-auto"></footer>
</body>
</html>
