<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="zh-CN">
<head th:replace="fragments :: head('ATRS 机票预定系统')"></head>
<body class="d-flex flex-column min-vh-100">
    <nav th:replace="fragments :: nav(${currentUser})"></nav>

    <section class="hero-section text-center text-white">
        <div class="container position-relative" style="z-index:1;">
            <div class="mb-3">
                <i class="bi bi-airplane-engines-fill" style="font-size:3.2rem;"></i>
            </div>
            <h1 class="display-4 mb-2">ATRS 机票预定</h1>
            <p class="lead mb-0">快速搜索、轻松比价，一键预定心仪航班</p>
        </div>
    </section>

    <div class="container" style="margin-top: -40px; position: relative; z-index: 10;">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card search-card">
                    <div class="card-body">
                        <h5 class="mb-4 fw-bold" style="color: var(--gray-800);">
                            <i class="bi bi-search me-2" style="color: var(--primary);"></i>搜索航班
                        </h5>
                        <form th:action="@{/flight/search}" method="get">
                            <div class="row g-3">
                                <div class="col-md-5">
                                    <label class="form-label">出发城市</label>
                                    <select name="departureCity" class="form-select" required>
                                        <option value="">请选择出发城市</option>
                                        <option th:each="city : ${departureCities}" th:value="${city}" th:text="${city}"></option>
                                    </select>
                                </div>
                                <div class="col-md-5">
                                    <label class="form-label">到达城市</label>
                                    <select name="arrivalCity" class="form-select" required>
                                        <option value="">请选择到达城市</option>
                                        <option th:each="city : ${arrivalCities}" th:value="${city}" th:text="${city}"></option>
                                    </select>
                                </div>
                                <div class="col-md-2 d-flex align-items-end">
                                    <button type="submit" class="btn btn-primary w-100">
                                        <i class="bi bi-search me-1"></i>搜索
                                    </button>
                                </div>
                            </div>
                            <div class="row mt-3">
                                <div class="col-md-4">
                                    <label class="form-label">出发日期（可选）</label>
                                    <input type="date" name="date" class="form-control">
                                </div>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>

        <div class="row justify-content-center mt-5 mb-4">
            <div class="col-lg-8 text-center">
                <div class="row g-4">
                    <div class="col-md-4">
                        <div class="p-4">
                            <span class="feature-icon" style="background: var(--success-light); color: var(--success);">
                                <i class="bi bi-shield-check"></i>
                            </span>
                            <h6 class="fw-bold">安全可靠</h6>
                            <small class="muted-text">多重验证保障交易安全</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="p-4">
                            <span class="feature-icon" style="background: var(--warning-light); color: var(--warning);">
                                <i class="bi bi-lightning-charge"></i>
                            </span>
                            <h6 class="fw-bold">极速出票</h6>
                            <small class="muted-text">在线支付即时确认出票</small>
                        </div>
                    </div>
                    <div class="col-md-4">
                        <div class="p-4">
                            <span class="feature-icon" style="background: var(--primary-light); color: var(--primary);">
                                <i class="bi bi-headset"></i>
                            </span>
                            <h6 class="fw-bold">贴心服务</h6>
                            <small class="muted-text">7x24小时客服全程陪伴</small>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="fragments :: footer" class="mt-auto"></footer>
</body>
</html>
